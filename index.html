<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parser AI | Nexus Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --sidebar: #1e293b;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* GİRİŞ EKRANI VE ANİMASYONLAR */
        #loginOverlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .login-box { background: var(--sidebar); padding: 3rem; border-radius: 24px; text-align: center; width: 400px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); transition: 0.3s; }
        .login-box h2 { font-size: 2rem; margin-bottom: 1rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
        .login-box input { width: 100%; padding: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: white; text-align: center; margin-bottom: 1rem; outline: none; transition: 0.3s; }
        .login-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        .login-box button { width: 100%; padding: 1rem; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { transform: translateY(-2px); opacity: 0.9; }
        .login-box button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* HATA MESAJI VE TİTREME ANİMASYONU */
        #loginError { color: var(--danger); font-size: 0.85rem; margin-bottom: 1.5rem; display: none; font-weight: 600; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); padding: 2.5rem 1.5rem; border-right: 1px solid var(--border); position: fixed; height: 100vh; }
        .sidebar h2 { display: flex; align-items: center; gap: 10px; font-weight: 700; margin-bottom: 3rem; color: #fff; }
        .sidebar h2 span { color: var(--primary); }
        .logout-btn { position: absolute; bottom: 2rem; left: 1.5rem; right: 1.5rem; padding: 0.8rem; background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: var(--danger); color: white; }

        /* ANA ALAN */
        .main { margin-left: 280px; flex-grow: 1; padding: 2.5rem; }
        
        /* KONTROLLER */
        .glass-panel { background: var(--card); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; }
        .controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        
        .btn { padding: 0.7rem 1.2rem; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
        .btn-danger { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
        .btn-danger:hover { background: var(--danger); color: white; }
        
        select, .search-box { background: var(--bg); border: 1px solid var(--border); color: white; padding: 0.7rem; border-radius: 10px; outline: none; }

        /* DASHBOARD LAYOUT */
        .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 2rem; }
        .stats-panel { position: -webkit-sticky; position: sticky; top: 2.5rem; height: fit-content; }
        .chart-wrap { height: 250px; margin-top: 1.5rem; }

        .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 0.6rem 1.2rem; border-radius: 10px; background: rgba(255,255,255,0.05); color: var(--text-muted); cursor: pointer; transition: 0.3s; border: 1px solid transparent; white-space: nowrap; }
        .tab:hover { background: rgba(255,255,255,0.1); }
        .tab.active { background: rgba(99, 102, 241, 0.15); color: var(--primary); border-color: rgba(99, 102, 241, 0.3); }

        /* NOT KARTLARI */
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .note-card { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .note-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.3); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .note-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        
        .cat-tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-bottom: 0.8rem; display: block; }
        .note-content { line-height: 1.6; font-size: 0.95rem; color: #cbd5e1; }
        .note-footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); }

        .card-THEOREM::before { background: var(--danger); }
        .card-LEMMA::before { background: var(--warning); }
        .card-SUMMARY { grid-column: 1 / -1; background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1)); border: 1px solid rgba(168, 85, 247, 0.2); }
        .card-SUMMARY::before { background: var(--secondary); }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box" id="loginBox">
            <h2>PARSER<span>AI</span></h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Secure Academic Intelligence</p>
            <input type="password" id="passInput" placeholder="Enter Access Key" onkeypress="if(event.key === 'Enter') login()">
            <p id="loginError">❌ Invalid Access Key!</p>
            <button id="loginBtn" onclick="login()">Access Dashboard</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>PARSER<span>AI</span></h2>
        <div style="margin-top: 2rem; color: var(--text-muted); font-size: 0.8rem;">ENGINE STATUS</div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--success); font-size: 0.9rem; margin-top: 0.5rem;">
            <div style="width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success);"></div> Ready
        </div>
        <button class="logout-btn" onclick="logout()">Terminate Session</button>
    </div>
    
    <div class="main">
        <div class="glass-panel controls">
            <input type="file" id="pdfFile" multiple style="color: var(--text-muted); font-size: 0.8rem;">
            <select id="langSelect">
                <option value="auto">🌍 Auto Detect</option>
                <option value="tr">🇹🇷 Turkish</option>
                <option value="en">🇬🇧 English</option>
            </select>
            <button class="btn btn-primary" id="uploadBtn" onclick="uploadPdf()">🚀 Analyze Files</button>
            <div style="flex-grow: 1;"></div>
            <button class="btn" style="background: #0ea5e9; color: white;" onclick="exportCsv()">Export Data</button>
            <button class="btn btn-danger" onclick="clearAll()">Clear Vault</button>
        </div>
        
        <div class="dashboard-grid">
            <div class="stats-panel glass-panel">
                <h3 style="font-size: 1.1rem; font-weight: 700;">Insights</h3>
                <div class="chart-wrap">
                    <canvas id="statsChart"></canvas>
                </div>
            </div>
            <div class="content-area">
                <input type="text" id="searchInput" class="search-box" style="width: 100%; margin-bottom: 1.5rem;" placeholder="Search within intelligence..." onkeyup="applyFilters()">
                <div class="filter-tabs">
                    <div class="tab active" onclick="setFilter('ALL', this)">All Nodes</div>
                    <div class="tab" onclick="setFilter('SUMMARY', this)">✨ AI Overviews</div>
                    <div class="tab" onclick="setFilter('DEFINITION', this)">Definitions</div>
                    <div class="tab" onclick="setFilter('THEOREM', this)">Theorems</div>
                    <div class="tab" onclick="setFilter('LEMMA', this)">Lemmas</div>
                </div>
                <div id="notesContainer" class="notes-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api';
        let myChart = null, allNotes = [], currentFilter = 'ALL';
        let currentApiKey = localStorage.getItem('api_key');

        if(!currentApiKey) { document.getElementById('loginOverlay').style.display = 'flex'; } 
        else { document.getElementById('loginOverlay').style.display = 'none'; fetchData(); }

        // YENİ VE GÜVENLİ LOGIN FONKSİYONU
        async function login() {
            const pass = document.getElementById('passInput').value;
            const btn = document.getElementById('loginBtn');
            const errorText = document.getElementById('loginError');
            const box = document.getElementById('loginBox');

            if(!pass) return;

            btn.innerHTML = "Verifying...";
            btn.disabled = true;
            errorText.style.display = "none";

            try {
                // Şifreyi sunucuya soruyoruz (Ekrani gizlemeden önce!)
                const res = await fetch(`${API_URL}/stats`, { headers: { 'X-API-Key': pass } });
                
                if(res.ok) {
                    // Şifre doğruysa içeri al
                    localStorage.setItem('api_key', pass); 
                    currentApiKey = pass; 
                    document.getElementById('loginOverlay').style.display = 'none'; 
                    fetchData();
                } else {
                    // Şifre hatalıysa animasyon oynat ve hata ver
                    errorText.style.display = "block";
                    box.classList.remove("shake-animation");
                    void box.offsetWidth; // Animasyonu sıfırlamak için DOM hilesi
                    box.classList.add("shake-animation");
                }
            } catch (err) {
                errorText.innerText = "❌ Sunucu bağlantı hatası!";
                errorText.style.display = "block";
            }

            btn.innerHTML = "Access Dashboard";
            btn.disabled = false;
        }

        function logout() { localStorage.removeItem('api_key'); location.reload(); }

        async function fetchWithAuth(url, options = {}) {
            options.headers = { ...options.headers, 'X-API-Key': currentApiKey };
            const res = await fetch(url, options);
            // Eğer içerideyken şifre geçersiz olursa dışarı at
            if (res.status === 401) { logout(); throw new Error("Unauthorized"); }
            return res;
        }

        async function fetchData() {
            try {
                const resNotes = await fetchWithAuth(`${API_URL}/notes`);
                allNotes = await resNotes.json(); 
                const resStats = await fetchWithAuth(`${API_URL}/stats`);
                const stats = await resStats.json();
                applyFilters(); renderChart(stats);
            } catch (err) { console.error("Data error:", err); }
        }

        function setFilter(category, btn) {
            currentFilter = category;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allNotes.filter(n => {
                const cat = (n.Category || "").toUpperCase();
                let matchCat = currentFilter === 'ALL' || (currentFilter === 'SUMMARY' && (cat === 'SUMMARY' || cat === 'TAGS')) || cat.includes(currentFilter);
                return matchCat && JSON.stringify(n).toLowerCase().includes(search);
            });
            renderNotes(filtered);
        }

        function renderNotes(notes) {
            const container = document.getElementById('notesContainer');
            if(!notes.length) return container.innerHTML = `<div style="color: var(--text-muted); opacity: 0.5;">No intelligence found...</div>`;
            
            container.innerHTML = notes.map(n => {
                const cat = (n.Category || "DEFINITION").toUpperCase();
                if(cat === "TAGS") {
                    const tags = (n.Content || "").split(',').map(t => `<span style="background:rgba(99,102,241,0.1); color:var(--primary); padding:4px 10px; border-radius:8px; font-size:0.7rem; margin-right:5px;">#${t.trim()}</span>`).join('');
                    return `<div class="note-card card-SUMMARY" style="grid-column: 1/-1;"> <span class="cat-tag">AI Keywords</span> <div style="display:flex; flex-wrap:wrap; gap:5px;">${tags}</div> </div>`;
                }
                return `
                    <div class="note-card card-${cat}">
                        <span class="cat-tag">${cat}</span>
                        <div class="note-content">${n.Content}</div>
                        <div class="note-footer"> <span>📂 ${n.Source}</span> <span>🗓️ ${(n.CreatedAt || "").split(' ')[0]}</span> </div>
                    </div>
                `;
            }).join('');
        }

        function renderChart(stats) {
            const canvas = document.getElementById('statsChart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            if(myChart) myChart.destroy();
            
            const data = [
                (stats.Definition || 0) + (stats.DEFINITION || 0),
                (stats.Theorem || 0) + (stats.THEOREM || 0),
                (stats.Lemma || 0) + (stats.LEMMA || 0)
            ];

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Definitions', 'Theorems', 'Lemmas'],
                    datasets: [{
                        data: data,
                        backgroundColor: ['#6366f1', '#ef4444', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20, usePointStyle: true } } }
                }
            });
        }

        async function uploadPdf() {
            const files = document.getElementById('pdfFile').files;
            const btn = document.getElementById('uploadBtn');
            const lang = document.getElementById('langSelect').value;
            if(!files.length) return;

            // 🛡️ 1. KADEME: FİZİKSEL SINIR (Maksimum 2 MB)
            const MAX_MB = 2;
            const MAX_BYTES = MAX_MB * 1024 * 1024;

            for (let i = 0; i < files.length; i++) {
                if (files[i].size > MAX_BYTES) {
                    alert(`❌ İŞLEM REDDEDİLDİ: "${files[i].name}" boyutu ${MAX_MB}MB sınırını aşıyor!\n\nLütfen PDF'i daha küçük parçalara bölüp yükleyin.`);
                    document.getElementById('pdfFile').value = ''; 
                    return; 
                }
            }

            btn.disabled = true;
            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                btn.innerHTML = `⏳ Analysing ${i+1}/${files.length}`;
                const fd = new FormData();
                fd.append('file', files[i]);
                try { 
                    const res = await fetchWithAuth(`${API_URL}/notes/upload?target_lang=${lang}`, { method: 'POST', body: fd }); 
                    
                    // 🛡️ 2. KADEME: YAPAY ZEKA TOKEN (KELİME) SINIRI KONTROLÜ
                    if (!res.ok) {
                        alert(`⚠️ YAPAY ZEKA LİMİTİ: "${files[i].name}" çok fazla kelime (token) içeriyor!\n\nYapay zeka modeli bu kadar uzun bir metni tek seferde okuyamaz. Lütfen PDF'in sadece ilgili kısımlarını (örn: 5-10 sayfa) içeren bir dosya yükleyin.`);
                        document.getElementById('pdfFile').value = '';
                        btn.innerHTML = "🚀 Analyze Files"; 
                        btn.disabled = false;
                        return; // Hata alınca diğer dosyaları yüklemeyi durdur
                    }
                    successCount++;
                } catch(e) {
                    console.error("Yükleme hatası:", e);
                }
            }
            
            btn.innerHTML = "🚀 Analyze Files"; 
            btn.disabled = false;
            document.getElementById('pdfFile').value = ''; // Yükleme bitince seçimi temizle
            
            if(successCount > 0) {
                fetchData(); // Sadece başarılı işlem varsa paneli güncelle
            }
        }

        function exportCsv() { window.location.href = `${API_URL}/notes/export/csv`; }
        async function clearAll() { if(confirm("Clear all intelligence?")) { await fetchWithAuth(`${API_URL}/notes/clear-all`, { method: 'DELETE' }); fetchData(); } }
    </script>
</body>
</html>
